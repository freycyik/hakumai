#Captain's Hardsuit
- type: entity
  parent: [ ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase ]
  id: ClothingHeadHelmetHardsuitExecSOL
  name: executive's hardsuit helmet
  description: Special hardsuit helmet, made for an executive of the Solar Legion.
  components:
  - type: Sprite
    sprite: _Persistence14/Clothing/Head/Helmets/Hardsuits/execspace.rsi
  - type: Clothing
    sprite: _Persistence14/Clothing/Head/Helmets/Hardsuits/execspace.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.3
    lowPressureMultiplier: 1000
  - type: PointLight
    radius: 5
  - type: Tag
    tags:
    - WhitelistChameleon

#Solar Legion Chief Engineer's Hardsuit
- type: entity
  parent: [ ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase ]
  id: ClothingHeadHelmetHardsuitEngineeringWhiteSOL
  name: solar legion chief engineer's hardsuit helmet
  description: Special hardsuit helmet, made for a chief engineer of the Solar Legion.
  components:
  - type: Sprite
    sprite: _Persistence14/Clothing/Head/Helmets/Hardsuits/engineering-white.rsi
    layers:
    - state: icon
    - state: icon-unshaded
      shader: unshaded
    - state: light-overlay
      visible: false
      shader: unshaded
      map: [ "light" ]
  - type: HandheldLight
    addPrefix: false
  - type: ToggleableVisuals
    spriteLayer: light
    clothingVisuals:
      head:
      - state: equipped-head-light
        shader: unshaded
      head-vox:
      - state: equipped-head-light-vox
        shader: unshaded
      head-vulpkanin:
      - state: equipped-head-light-vulpkanin
        shader: unshaded
      head-reptilian:
      - state: equipped-head-light-reptilian
        shader: unshaded
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-head
      - state: equipped-head-unshaded
        shader: unshaded
      head-vox:
      - state: equipped-head-vox
      - state: equipped-head-unshaded-vox
        shader: unshaded
      head-vulpkanin:
      - state: equipped-head-vulpkanin
      - state: equipped-head-unshaded-vulpkanin
        shader: unshaded
      head-reptilian:
      - state: equipped-head-reptilian
      - state: equipped-head-unshaded-reptilian
        shader: unshaded
  - type: PointLight
    radius: 5
    color: "#daffad"
  - type: PressureProtection
    highPressureMultiplier: 0.08
    lowPressureMultiplier: 1000
  - type: FireProtection
    reduction: 0.2
  - type: Tag
    tags:
    - WhitelistChameleon

