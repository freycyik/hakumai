    sprite: _Persistence14/Clothing/Head/Helmets/Hardsuits/security-red.rsi
  - type: PointLight
    radius: 5
    color: "#ffeead"
  - type: PressureProtection
    highPressureMultiplier: 0.45
    lowPressureMultiplier: 1000
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
